<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мій сучасний сайт</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
    }

    header {
      padding: 60px 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: white;
      color: #2a5298;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
    }

    .card {
      background: rgba(255,255,255,0.1);
      margin: 20px auto;
      padding: 20px;
      max-width: 500px;
      border-radius: 15px;
    }

    footer {
      margin-top: 30px;
      padding: 20px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <header>
    <h1>Привіт 👋</h1>
    <p>Це сайт для завантаження</p>
    <a href="#" class="btn">Моя кнопка</a>
  </header>

  <div class="card">
    <h2>Про мене</h2>
    <p>Я створюю сайти та працюю з HTML/CSS.</p>
  </div>

  <div class="card">
    <h2>Контакти</h2>
    <p>Email: example@gmail.com</p>
  </div>

  <footer>
    © 2026 Мій сайт
  </footer>

</body>
</html>
